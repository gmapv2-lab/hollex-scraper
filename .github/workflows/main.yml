name: Hollex Scraper

on:
  workflow_dispatch:
    inputs:
      packing_date:
        description: 'Packing date to scrape (format: MM/DD/YYYY)'
        required: false
        default: ''
      urls:
        description: 'Comma-separated list of category URLs to scrape'
        required: true
        default: ''

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install stealth packages
        run: npm install playwright-extra puppeteer-extra-plugin-stealth

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Create Google credentials
        shell: bash
        run: |
          cat > service-account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Create session.json
        shell: bash
        run: |
          cat > session.json <<'EOF'
          ${{ secrets.SESSION_JSON }}
          EOF

      - name: Run scraper script
        env:
          HOLEX_USERNAME: ${{ secrets.HOLEX_USERNAME }}
          HOLEX_PASSWORD: ${{ secrets.HOLEX_PASSWORD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          ANTHURIUM_BASE_URL: ${{ secrets.ANTHURIUM_BASE_URL }}
          CREDENTIALS_PATH: service-account.json
          LOG_PATH: scraper.log
          PACKING_DATE: ${{ github.event.inputs.packing_date }}
          URLS: ${{ github.event.inputs.urls }}
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: node scrap.js

      - name: Trigger Apps Script WebApps
        run: |
          curl -L --post301 --post302 -X POST \
            "https://script.google.com/macros/s/AKfycbyuL6Me8hEP1DReBwiUy-juvHQ-DNjXBwFjqUC3yMnRpC83eEDobckL6nhQVcZyc-Ds/exec" \
            -d "key=B7vN20HxKpL9"

          sleep 10

          curl -L --post301 --post302 -X POST \
            "https://script.google.com/macros/s/AKfycbyuL6Me8hEP1DReBwiUy-juvHQ-DNjXBwFjqUC3yMnRpC83eEDobckL6nhQVcZyc-Ds/exec" \
            -d "key=SIJ9de0sadST"
